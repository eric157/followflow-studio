name: Release – Windows Binary

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write   # needed to create a GitHub Release

jobs:
  build-windows:
    name: Build Windows EXE & Publish Release
    runs-on: windows-latest

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Python ──────────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── Dependencies ─────────────────────────────────────────────────────────
      - name: Install project + build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[build]"

      - name: Install Playwright browsers (Chromium only)
        run: python -m playwright install chromium --with-deps

      # ── Build ────────────────────────────────────────────────────────────────
      - name: Build Windows executable with PyInstaller
        run: |
          python -m PyInstaller `
            --noconfirm `
            --clean `
            --windowed `
            --onedir `
            --name "FollowFlow" `
            --paths "src" `
            --collect-all "playwright" `
            --collect-all "customtkinter" `
            "followflow_app.py"

      # ── Package ──────────────────────────────────────────────────────────────
      - name: Create release ZIP archive
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $zipName = "FollowFlow-Windows-${version}.zip"
          if (Test-Path $zipName) { Remove-Item $zipName }
          Compress-Archive -Path "dist\FollowFlow\*" -DestinationPath $zipName
          echo "ZIP_NAME=$zipName" >> $env:GITHUB_ENV

      # ── Release ──────────────────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "FollowFlow Studio ${{ github.ref_name }}"
          body: |
            ## FollowFlow Studio ${{ github.ref_name }}

            ### What's included
            - **Windows portable build** – extract the ZIP and run `FollowFlow.exe` directly (no Python needed).
            - Powered by Playwright Chromium (bundled).

            ### Installation
            1. Download `FollowFlow-Windows-${{ github.ref_name }}.zip` below.
            2. Extract anywhere on your PC.
            3. Run `FollowFlow.exe`.

            ### CLI also available via pip
            ```bash
            pip install git+https://github.com/eric157/followflow-studio.git@${{ github.ref_name }}
            playwright install chromium
            followflow --help
            ```

            ### Docker
            ```bash
            docker pull ghcr.io/eric157/followflow-studio:${{ github.ref_name }}
            docker run --rm ghcr.io/eric157/followflow-studio:${{ github.ref_name }} followflow --help
            ```
          draft: false
          prerelease: false
          files: ${{ env.ZIP_NAME }}
